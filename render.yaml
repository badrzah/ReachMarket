# Render Blueprint — https://render.com/docs/blueprint-spec
databases:
  - name: reachgtm-db
    databaseName: reachgtm
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: reachgtm-backend
    runtime: docker
    repo: https://github.com/badrzah/ReachMarket
    branch: cloudflare-deploy
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: reachgtm-db
          property: connectionString
      - key: REDIS_URL
        value: redis://default:free-tier-ondeman-d-xxxxx@xxxxx.upstash.io:6379
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: AGENTS_URL
        value: http://reachgtm-agents:8001

  - type: web
    name: reachgtm-agents
    runtime: docker
    repo: https://github.com/badrzah/ReachMarket
    branch: cloudflare-deploy
    dockerfilePath: agents/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: reachgtm-db
          property: connectionString
      - key: REDIS_URL
        value: redis://default:free-tier-ondeman-d-xxxxx@xxxxx.upstash.io:6379
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
