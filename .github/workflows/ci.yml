name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [staging, main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check agents/ backend/ shared/
      - run: mypy backend/ shared/ --ignore-missing-imports --namespace-packages --explicit-package-bases
      - run: mypy agents/ shared/ --ignore-missing-imports --namespace-packages --explicit-package-bases

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: reachgtm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: .
      DATABASE_URL: postgresql://postgres:***@localhost:5432/reachgtm_test
      JWT_SECRET: test-secret-do-not-use-in-prod
      OPENAI_API_KEY: test
      REDIS_URL: redis://localhost:***@v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run backend tests
        run: pytest backend/tests/ --import-mode=importlib -v

  test-agents:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      DATABASE_URL: postgresql://postgres:***@localhost:5432/reachgtm_test
      OPENAI_API_KEY: test
      REDIS_URL: redis://localhost:***@v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install agents deps
        run: pip install -r agents/requirements.txt
      - name: Run agents tests
        run: pytest agents/tests/ --import-mode=importlib -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npx eslint . --max-warnings 0
      - name: Type check frontend
        working-directory: frontend
        run: npm run type-check
