name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [staging, main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check agents/ backend/ shared/
      - run: mypy agents/ backend/ shared/ --ignore-missing-imports

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: reachgtm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt
      - env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/reachgtm_test
          JWT_SECRET: test-secret-do-not-use-in-prod
          OPENAI_API_KEY: test
          REDIS_URL: redis://localhost:6379
        run: pytest backend/tests/ -v

  test-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r agents/requirements.txt
      - env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/reachgtm_test
          OPENAI_API_KEY: test
          REDIS_URL: redis://localhost:6379
        run: pytest agents/tests/ -v

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm run type-check
